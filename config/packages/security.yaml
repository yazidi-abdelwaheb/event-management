security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        admin:
            pattern: ^/admin 
            lazy: true
            provider: app_user_provider 
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin 
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_my_profile
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin,       roles: ROLE_ADMIN }
        - { path: ^/my-profile,  roles: ROLE_CLIENT }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10